<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Content Pipeline</title>

    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

        href="https://fonts.googleapis.com/css2?family=Satoshi:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --radius: 16px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: #09090b;
            font-family: 'Satoshi', -apple-system, sans-serif;
            color: #a1a1aa;
            overflow-x: hidden;
        }

        /* Animated background orbs */
        .bg-orbs {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            overflow: hidden;
        }

        .bg-orbs::before,
        .bg-orbs::after {
            content: '';
            position: absolute;
            border-radius: 50%;
            filter: blur(120px);
            opacity: 0.12;
        }

        .bg-orbs::before {
            width: 600px;
            height: 600px;
            background: #6366f1;
            top: -200px;
            left: -100px;
            animation: orbFloat 20s ease-in-out infinite;
        }

        .bg-orbs::after {
            width: 500px;
            height: 500px;
            background: #06b6d4;
            bottom: -150px;
            right: -100px;
            animation: orbFloat 25s ease-in-out infinite reverse;
        }

        @keyframes orbFloat {

            0%,
            100% {
                transform: translate(0, 0) scale(1);
            }

            33% {
                transform: translate(60px, 40px) scale(1.1);
            }

            66% {
                transform: translate(-40px, 60px) scale(0.95);
            }
        }

        /* Bento cards with glow */
        .bento {
            background: rgba(24, 24, 27, 0.8);
            border: 1px solid #27272a;
            border-radius: var(--radius);
            transition: border-color 0.4s, box-shadow 0.4s, transform 0.3s;
            backdrop-filter: blur(12px);
        }

        .bento:hover {
            border-color: #3f3f46;
            box-shadow: 0 0 30px rgba(99, 102, 241, 0.06), 0 8px 32px rgba(0, 0, 0, 0.3);
            transform: translateY(-2px);
        }

        /* Glassmorphism header */
        .glass-header {
            background: rgba(9, 9, 11, 0.7);
            backdrop-filter: blur(20px) saturate(1.5);
            border-bottom: 1px solid rgba(39, 39, 42, 0.5);
        }

        /* Animations */
        @keyframes enter {
            from {
                opacity: 0;
                transform: translateY(16px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-8px);
            }

            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        @keyframes countPop {
            from {
                transform: scale(0.6);
                opacity: 0;
            }

            to {
                transform: scale(1);
                opacity: 1;
            }
        }

        @keyframes barGrow {
            from {
                width: 0;
            }
        }

        @keyframes shimmer {
            to {
                background-position: -200% 0;
            }
        }

        @keyframes pulse-glow {

            0%,
            100% {
                box-shadow: 0 0 4px currentColor;
            }

            50% {
                box-shadow: 0 0 16px currentColor;
            }
        }

        @keyframes dash {
            to {
                stroke-dashoffset: 0;
            }
        }

        @keyframes gradientShift {
            0% {
                background-position: 0% 50%;
            }

            50% {
                background-position: 100% 50%;
            }

            100% {
                background-position: 0% 50%;
            }
        }

        @keyframes confetti-fall {
            0% {
                transform: translateY(-10px) rotate(0deg);
                opacity: 1;
            }

            100% {
                transform: translateY(60px) rotate(360deg);
                opacity: 0;
            }
        }

        @keyframes fadeTab {
            from {
                opacity: 0;
                transform: translateY(8px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .enter {
            animation: enter 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94) both;
        }

        .slide-in {
            animation: slideIn 0.3s ease both;
        }

        .count-pop {
            animation: countPop 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) both;
        }

        .timer-bar {
            transition: width 1s linear;
        }

        .tab-fade {
            animation: fadeTab 0.4s ease both;
        }

        /* Gradient text */
        .gradient-text {
            background: linear-gradient(135deg, #818cf8, #06b6d4, #a78bfa);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            background-size: 200% 200%;
            animation: gradientShift 4s ease infinite;
        }

        /* Live pulse dot */
        .live-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #34d399;
            animation: pulse-glow 2s ease infinite;
            box-shadow: 0 0 8px #34d399;
        }

        .live-dot-amber {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #fbbf24;
            animation: pulse-glow 1.5s ease infinite;
            box-shadow: 0 0 8px #fbbf24;
        }

        /* Shimmer skeleton */
        .skeleton {
            background: linear-gradient(90deg, #18181b 25%, #27272a 50%, #18181b 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s ease infinite;
            border-radius: var(--radius);
        }

        /* Pipeline connector */
        .pipeline-connector {
            height: 2px;
            flex: 1;
            background: linear-gradient(90deg, #3f3f46, #52525b);
            position: relative;
            overflow: hidden;
            border-radius: 1px;
        }

        .pipeline-connector::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(90deg, transparent, #818cf8, transparent);
            animation: dash 2s linear infinite;
        }

        @keyframes dash {
            0% {
                transform: translateX(-100%);
            }

            100% {
                transform: translateX(100%);
            }
        }

        /* Smooth accordion */
        .accordion-content {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.4s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.3s;
            opacity: 0;
        }

        .accordion-content.open {
            max-height: 600px;
            opacity: 1;
        }

        /* Circular timer */
        .timer-ring {
            transform: rotate(-90deg);
        }

        .timer-ring circle {
            transition: stroke-dashoffset 1s linear;
        }

        /* Typography */
        .text-display {
            font-size: 3rem;
            font-weight: 800;
            line-height: 1;
            letter-spacing: -0.03em;
            color: #fafafa;
        }

        .text-heading {
            font-size: 15px;
            font-weight: 700;
            letter-spacing: -0.01em;
            color: #fafafa;
        }

        .text-sub {
            font-size: 13px;
            font-weight: 500;
            color: #71717a;
        }

        .text-label {
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: #52525b;
        }

        .text-mono {
            font-family: 'JetBrains Mono', monospace;
            font-size: 13px;
        }

        /* Accents */
        .accent-blue {
            color: #60a5fa;
        }

        .accent-violet {
            color: #a78bfa;
        }

        .accent-emerald {
            color: #34d399;
        }

        .accent-rose {
            color: #fb7185;
        }

        .accent-amber {
            color: #fbbf24;
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 4px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: #27272a;
            border-radius: 8px;
        }

        /* Button hover glow */
        .btn-primary {
            background: #fff;
            color: #18181b;
            border: none;
            font-weight: 700;
            transition: all 0.3s;
        }

        .btn-primary:hover {
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.15);
            transform: translateY(-1px);
        }

        .btn-primary:active {
            transform: scale(0.97);
        }

        /* Step glow */
        .step-box {
            transition: all 0.3s;
        }

        .step-box:hover {
            transform: translateY(-3px);
            box-shadow: 0 4px 20px rgba(99, 102, 241, 0.1);
        }

        /* Quiz option hover */
        .quiz-option {
            transition: all 0.2s;
        }

        .quiz-option:not(:disabled):hover {
            transform: translateX(4px);
            border-color: #52525b !important;
        }

        /* Progress dots */
        .progress-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            transition: all 0.3s;
        }

        /* Footer */
        .footer-gradient {
            background: linear-gradient(to top, rgba(9, 9, 11, 1), transparent);
        }
    </style>
    <script>
        tailwind.config = { theme: { extend: { fontFamily: { sans: ['Satoshi', 'system-ui', 'sans-serif'] } } } }
    </script>
</head>

        /* ═══ TAB 2: TRIVIA ═══ */

            const fetchPosts = async (q) => {
                setLoading(true);
                try {
                    const s = q !== undefined ? q : search;
                    const res = await fetch(`/api/content?category=${filter}${s ? `&search=${encodeURIComponent(s)}` : ''}`);
                    setPosts(await res.json());
                } catch (e) { }
                setLoading(false);
            };
            const onSearch = (v) => { setSearch(v); clearTimeout(debounce.current); debounce.current = setTimeout(() => fetchPosts(v), 350); };

            return (
                <div className="space-y-4 enter">
                    <div className="flex flex-col sm:flex-row gap-3">
                        <div className="relative flex-1">
                            <div className="absolute left-3.5 top-3.5 text-zinc-600"><Icon name="search" size={16} /></div>
                            <input type="text" value={search} onChange={e => onSearch(e.target.value)}
                                placeholder="Search trivia, captions, news..."
                                className="w-full bg-zinc-900 border border-zinc-800 rounded-xl pl-10 pr-4 py-3 text-[14px] text-zinc-200 placeholder-zinc-600 focus:outline-none focus:border-zinc-600 transition-colors" />
                        </div>
                        <div className="flex gap-1.5 overflow-x-auto pb-1" style={{ scrollbarWidth: 'none', msOverflowStyle: 'none', WebkitOverflowScrolling: 'touch' }}>
                            {[
                                { id: 'all', icon: 'globe', label: 'All' },
                                { id: 'trending', icon: 'flame', label: 'Trending' },
                                { id: 'entertainment', icon: 'film', label: 'Entertainment' },
                                { id: 'sports', icon: 'trophy', label: 'Sports' },
                                { id: 'controversy', icon: 'zap', label: 'Controversy' },
                                { id: 'science', icon: 'microscope', label: 'Science' },
                                { id: 'history', icon: 'history', label: 'History' },
                                { id: 'animals', icon: 'leaf', label: 'Animals' },
                                { id: 'technology', icon: 'monitor', label: 'Tech & AI' },
                                { id: 'geography', icon: 'compass', label: 'Geography' },
                                { id: 'health', icon: 'heart-pulse', label: 'Health' },
                            ].map(c => (
                                <button key={c.id} onClick={() => setFilter(c.id)}
                                    className={`flex items-center gap-1.5 px-3.5 py-2 rounded-lg text-[12px] font-semibold transition-all whitespace-nowrap shrink-0 ${filter === c.id ? 'bg-zinc-800 text-zinc-100 border border-zinc-700' : 'text-zinc-600 border border-transparent hover:text-zinc-400'
                                        }`}><Icon name={c.icon} size={13} /> {c.label}</button>
                            ))}

                    </div>

                    <p className="text-sub">{posts.length} facts found</p>

                    {top && top.score >= 7 && !search && (
                        <div className="bento p-6 border-amber-900/30 enter" style={{ background: 'linear-gradient(135deg, rgba(251,191,36,0.03), #18181b)' }}>
                            <p className="text-label accent-amber flex items-center gap-1.5 mb-2"><Icon name="lightbulb" size={14} className="accent-amber" /> Did You Know?</p>
                            <div className="text-[16px] text-zinc-200 leading-relaxed font-medium [&_strong]:text-amber-400 [&_em]:text-amber-200/80" dangerouslySetInnerHTML={{ __html: typeof marked !== 'undefined' ? marked.parseInline(top.trivia) : top.trivia }} />
                            <p className="text-sub mt-3 truncate">— {top.title}</p>
                        </div>
                    )}

                    {loading ? (
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-3">
                            {[1, 2, 3, 4].map(i => <div key={i} className="skeleton h-40" />)}
                        </div>
                    ) : posts.length === 0 ? (
                        <div className="bento p-14 text-center border-dashed">
                            <div className="text-zinc-700 mb-3"><Icon name="inbox" size={36} /></div>
                            <p className="text-sub text-[14px]">{search ? 'No results found.' : 'No content yet. Run the pipeline first.'}</p>
                        </div>
                    ) : (
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-3">
                            {posts.map((item, i) => <TriviaCard key={item.id} item={item} i={i} />)}

            const scoreColor = item.score >= 8 ? 'text-emerald-400 bg-emerald-500/10' : item.score >= 6 ? 'text-amber-400 bg-amber-500/10' : 'text-rose-400 bg-rose-500/10';

            return (
                <div className="bento overflow-hidden enter" style={{ animationDelay: `${Math.min(i * 40, 200)}ms` }}>

                        </div>
                        {item.headline && item.title && <p className="text-zinc-600 text-[11px] truncate mb-2">— {item.title}</p>}
                        <div className="flex justify-between items-center">
                            <span className="text-label capitalize flex items-center gap-1.5">
                                <Icon name={{
                                    trending: 'flame', entertainment: 'film', sports: 'trophy',
                                    controversy: 'zap', science: 'microscope', history: 'history',
                                    animals: 'leaf', technology: 'monitor', geography: 'compass',
                                    health: 'heart-pulse'
                                }[item.category] || 'newspaper'} size={13} className="text-zinc-600" />
                                {item.category}
                            </span>
                            <span className={`text-zinc-600 transition-transform duration-200 ${open ? 'rotate-180' : ''}`}>
                                <Icon name="chevron-down" size={14} />
                            </span>

                    </div>
                    {open && (
                        <div className="border-t border-zinc-800/50 p-5 space-y-4 bg-zinc-950/40 enter">
                            <div>
                                <p className="text-label flex items-center gap-1.5 mb-2"><Icon name="instagram" size={13} className="text-zinc-600" /> Caption</p>
                                <div className="text-zinc-400 text-[13px] whitespace-pre-wrap leading-relaxed [&_strong]:text-zinc-300" dangerouslySetInnerHTML={{ __html: typeof marked !== 'undefined' ? marked.parseInline(item.caption || 'N/A') : (item.caption || 'N/A') }} />
                            </div>

                                <div>

                                        {mcq.options.map((o, j) => (
                                            <div key={j} className={`text-[13px] py-2 px-3 rounded-lg border flex items-center gap-2 ${o === mcq.correctAnswer ? 'border-emerald-800/40 bg-emerald-950/20 text-emerald-400' : 'border-zinc-800 text-zinc-500'
                                                }`}>
                                                {o === mcq.correctAnswer && <Icon name="check" size={14} className="accent-emerald" />}
                                                {o}

        /* ═══ TAB 3: QUIZ ═══ */
        function PlayQuiz() {
            const [state, setState] = useState('start');
            const [questions, setQuestions] = useState([]);
            const [cur, setCur] = useState(0);
            const [score, setScore] = useState(0);
            const [sel, setSel] = useState(null);
            const [timer, setTimer] = useState(30);
            const [answered, setAnswered] = useState(false);
            const [totalTime, setTotalTime] = useState(0);
            const [startTime, setStartTime] = useState(null);
            const [history, setHistory] = useState(() => { try { return JSON.parse(localStorage.getItem('quizHistory') || '[]'); } catch { return []; } });
            const timerRef = useRef(null);


            const start = async () => {
                try {
                    const d = await (await fetch('/api/quiz')).json();
                    if (d.questions.length === 0) return alert('No quiz questions yet! Run the pipeline first.');
                    setQuestions(d.questions); setCur(0); setScore(0); setSel(null); setAnswered(false); setTimer(30);
                    setStartTime(Date.now()); setState('playing');
                } catch (e) { }
            };

            useEffect(() => {
                if (state !== 'playing' || answered) return;
                timerRef.current = setInterval(() => {
                    setTimer(p => { if (p <= 1) { clearInterval(timerRef.current); doTimeout(); return 0; } return p - 1; });
                }, 1000);
                return () => clearInterval(timerRef.current);
            }, [state, cur, answered]);

            const doTimeout = () => { setAnswered(true); setSel('__t__'); setTimeout(next, 1500); };
            const answer = (o) => {
                if (answered) return;
                clearInterval(timerRef.current); setSel(o); setAnswered(true);
                if (o === questions[cur].correctAnswer) setScore(p => p + 1);
                setTimeout(next, 1500);
            };
            const next = () => {
                if (cur + 1 >= questions.length) {
                    const t = Math.round((Date.now() - startTime) / 1000);
                    setTotalTime(t);
                    const h = [{ date: new Date().toLocaleDateString(), score, total: questions.length, time: t }, ...history].slice(0, 10);
                    setHistory(h);
                    try { localStorage.setItem('quizHistory', JSON.stringify(h)); } catch { }
                    setState('result');
                } else { setCur(p => p + 1); setSel(null); setAnswered(false); setTimer(30); }
            };
            const share = () => {
                navigator.clipboard.writeText(`AI News Quiz  |  ${score}/${questions.length}  |  ${Math.floor(totalTime / 60)}:${String(totalTime % 60).padStart(2, '0')}`).then(() => alert('Copied to clipboard!'));
            };

            if (state === 'start') {
                return (
                    <div className="enter">
                        <div className="flex flex-col items-center justify-center py-16 text-center">
                            <div className="w-16 h-16 rounded-2xl bg-violet-500/10 flex items-center justify-center mb-6 accent-violet count-pop">
                                <Icon name="brain" size={30} />
                            </div>
                            <h2 className="text-[26px] font-black text-white tracking-tight mb-2">AI News Quiz</h2>
                            <p className="text-sub text-[15px] max-w-sm mb-8 leading-relaxed">Test your knowledge with AI-generated questions from the latest news</p>
                            <div className="flex gap-8 text-[14px] text-zinc-500 mb-10">
                                <span className="flex items-center gap-2"><Icon name="list" size={16} className="accent-blue" /> 5 Questions</span>
                                <span className="flex items-center gap-2"><Icon name="clock" size={16} className="accent-violet" /> 30s each</span>
                                <span className="flex items-center gap-2"><Icon name="check-circle" size={16} className="accent-emerald" /> Instant feedback</span>
                            </div>
                            <button onClick={start}
                                className="flex items-center gap-2 px-8 py-3.5 rounded-xl font-bold text-[15px] bg-white text-zinc-900 hover:bg-zinc-200 active:scale-[0.97] transition-all">
                                <Icon name="play" size={18} /> Start Quiz
                            </button>
                        </div>
                        {history.length > 0 && (
                            <div className="bento p-5 mt-4">
                                <p className="text-label mb-4 flex items-center gap-2"><Icon name="history" size={14} className="text-zinc-600" /> Past Attempts</p>
                                <div className="space-y-2">
                                    {history.map((h, i) => (
                                        <div key={i} className="flex justify-between items-center text-[14px] bg-zinc-900/60 rounded-lg px-4 py-3 border border-zinc-800/50">
                                            <span className="text-zinc-600">{h.date}</span>
                                            <span className="text-[14px] font-bold text-white">{h.score}/{h.total}</span>
                                            <span className="text-mono text-zinc-600">{Math.floor(h.time / 60)}:{String(h.time % 60).padStart(2, '0')}</span>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}
                    </div>
                );
            }

            if (state === 'result') {
                const pct = Math.round((score / questions.length) * 100);
                return (
                    <div className="flex flex-col items-center justify-center py-14 text-center enter">
                        <div className={`w-16 h-16 rounded-2xl flex items-center justify-center mb-5 count-pop ${pct >= 60 ? 'bg-emerald-500/10 accent-emerald' : 'bg-amber-500/10 accent-amber'}`}>
                            <Icon name={pct >= 60 ? 'trophy' : 'target'} size={28} />
                        </div>
                        <p className="text-label text-[13px] mb-5">Quiz Complete</p>
                        <div className="bento px-12 py-8 mb-7">
                            <p className="text-display text-[4rem] count-pop">{score}<span className="text-zinc-600 text-2xl">/{questions.length}</span></p>
                            <div className="flex items-center justify-center gap-5 mt-4 text-[14px] text-zinc-500">
                                <span className="flex items-center gap-1.5"><Icon name="clock" size={16} className="text-zinc-600" /> {Math.floor(totalTime / 60)}:{String(totalTime % 60).padStart(2, '0')}</span>
                                <span className="flex items-center gap-1.5"><Icon name="percent" size={16} className="text-zinc-600" /> {pct}% correct</span>
                            </div>
                        </div>
                        <div className="flex gap-3">
                            <button onClick={share} className="flex items-center gap-2 px-5 py-2.5 rounded-xl text-[14px] font-semibold bento text-zinc-300 hover:border-zinc-600 transition-all">
                                <Icon name="share-2" size={16} /> Share
                            </button>
                            <button onClick={start} className="flex items-center gap-2 px-5 py-2.5 rounded-xl text-[14px] font-bold bg-white text-zinc-900 hover:bg-zinc-200 active:scale-[0.97] transition-all">
                                <Icon name="rotate-ccw" size={16} /> Play Again
                            </button>
                        </div>
                    </div>
                );
            }

            const q = questions[cur];
            const circumference = 2 * Math.PI * 20;
            const timerOffset = circumference - (timer / 30) * circumference;
            return (
                <div className="max-w-2xl mx-auto enter">
                    <div className="flex justify-between items-center mb-4">
                        <div className="flex items-center gap-2">
                            <span className="text-label text-[13px]">Question {cur + 1} of {questions.length}</span>
                            <div className="flex gap-1.5 ml-2">
                                {questions.map((_, i) => (
                                    <div key={i} className={`progress-dot ${i < cur ? 'bg-emerald-500' : i === cur ? 'bg-blue-500 scale-125' : 'bg-zinc-800'}`} />
                                ))}
                            </div>
                        </div>
                        <div className="relative flex items-center justify-center">
                            <svg width="48" height="48" className="timer-ring">
                                <circle cx="24" cy="24" r="20" fill="none" stroke="#27272a" strokeWidth="3" />
                                <circle cx="24" cy="24" r="20" fill="none" stroke={timer <= 10 ? '#fb7185' : '#60a5fa'} strokeWidth="3"
                                    strokeDasharray={circumference} strokeDashoffset={timerOffset} strokeLinecap="round" />
                            </svg>
                            <span className={`absolute text-[14px] font-bold ${timer <= 10 ? 'accent-rose' : 'accent-blue'}`}>{timer}</span>
                        </div>
                    </div>
                    <div className="w-full bg-zinc-800/50 rounded-full h-1 mb-6">
                        <div className="bg-blue-500/40 h-1 rounded-full transition-all duration-500" style={{ width: `${((cur + (answered ? 1 : 0)) / questions.length) * 100}%` }} />
                    </div>
                    <p className="text-sub text-[12px] uppercase tracking-wider mb-2">{q.category} — {q.newsTitle?.substring(0, 55)}...</p>
                    <h2 className="text-[18px] font-bold text-white leading-relaxed mb-7">{q.question}</h2>
                    <div className="space-y-2.5">
                        {q.options.map((o, i) => {
                            let cls = 'border-zinc-800 bg-zinc-900/40 text-zinc-200 hover:border-zinc-600 hover:bg-zinc-800/40 cursor-pointer';
                            if (answered) {
                                if (o === q.correctAnswer) cls = 'border-emerald-700/50 bg-emerald-950/30 text-emerald-300';
                                else if (o === sel) cls = 'border-rose-700/50 bg-rose-950/30 text-rose-300';
                                else cls = 'border-zinc-900 bg-zinc-950/50 text-zinc-700';
                            }
                            return (
                                <button key={i} onClick={() => answer(o)} disabled={answered}
                                    className={`w-full text-left p-4 rounded-xl border text-[14px] font-medium flex items-center gap-3 quiz-option ${cls}`}>
                                    <span className="w-7 h-7 rounded-lg bg-zinc-800/50 flex items-center justify-center shrink-0 text-[13px] font-bold text-zinc-500">{String.fromCharCode(65 + i)}</span>
                                    <span className="flex-1">{o}</span>
                                    {answered && o === q.correctAnswer && <Icon name="check" size={18} className="accent-emerald" />}
                                    {answered && o === sel && o !== q.correctAnswer && <Icon name="x" size={18} className="accent-rose" />}
                                </button>
                            );
                        })}
                    </div>
                    <p className="text-center mt-6 text-[14px] text-zinc-500">Score: <span className="text-white font-bold">{score}</span>/{questions.length}</p>
                </div>
            );
        }


        /* ═══ MAIN APP ═══ */
        function App() {
            const [tab, setTab] = useState('dashboard');

            const tabs = [
                { id: 'dashboard', icon: 'zap', label: 'Pipeline' },
                { id: 'trivia', icon: 'book-open', label: 'Trivia' },
                { id: 'quiz', icon: 'gamepad-2', label: 'Quiz' },
            ];

            return (
                <div className="min-h-screen">
                    <header className="glass-header sticky top-0 z-50">
                        <div className="max-w-5xl mx-auto px-5 h-16 flex items-center justify-between">
                            <div className="flex items-center gap-3">
                                <div className="w-10 h-10 rounded-xl bg-gradient-to-br from-indigo-500 to-cyan-500 flex items-center justify-center shadow-lg shadow-indigo-500/20">
                                    <span className="text-white font-black text-[13px]">AI</span>
                                </div>
                                <div>
                                    <h1 className="text-[17px] font-bold text-white leading-none">Content Pipeline</h1>
                                    <p className="text-[12px] text-zinc-500 mt-0.5">News to Instagram & Trivia</p>
                                </div>
                            </div>
                            <nav className="flex gap-px bg-zinc-900/80 rounded-xl p-1 border border-zinc-800/50 backdrop-blur">
                                {tabs.map(t => (
                                    <button key={t.id} onClick={() => setTab(t.id)}
                                        className={`flex items-center gap-1.5 px-4 py-2 rounded-lg text-[13px] font-semibold transition-all ${tab === t.id ? 'bg-zinc-800 text-white shadow-sm' : 'text-zinc-600 hover:text-zinc-400'
                                            }`}>
                                        <Icon name={t.icon} size={15} />
                                        <span className="hidden sm:inline">{t.label}</span>
                                    </button>
                                ))}
                            </nav>
                        </div>
                    </header>
                    <main className="max-w-5xl mx-auto px-5 py-6 tab-fade" key={tab}>
                        {tab === 'dashboard' && <PipelineDashboard />}
                        {tab === 'trivia' && <TriviaEncyclopedia />}
                        {tab === 'quiz' && <PlayQuiz />}
                    </main>
                    <footer className="border-t border-zinc-800/30 mt-12 py-6">
                        <div className="max-w-5xl mx-auto px-5 flex flex-col sm:flex-row items-center justify-between gap-3">
                            <p className="text-[12px] text-zinc-600">Built with Gemini AI, React & PostgreSQL</p>
                            <div className="flex items-center gap-4 text-[12px] text-zinc-700">
                                <span className="flex items-center gap-1.5"><Icon name="zap" size={12} className="accent-amber" /> Auto-runs every 3 hours</span>
                                <span className="flex items-center gap-1.5"><Icon name="database" size={12} className="accent-emerald" /> Prisma ORM</span>
                            </div>
                        </div>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
