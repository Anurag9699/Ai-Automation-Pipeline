<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IWTK — India Wants To Know</title>
    <meta name="description"
        content="A curated 'did you know?' engine surfacing only the most interesting facts from recent events.">
    <link
        href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0a0a0f;
            --bg-card: #12121a;
            --bg-card-hover: #1a1a28;
            --accent-amber: #f59e0b;
            --accent-blue: #3b82f6;
            --accent-coral: #f97316;
            --accent-green: #10b981;
            --accent-purple: #8b5cf6;
            --accent-pink: #ec4899;
            --accent-red: #ef4444;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            --border: #1e293b;
            --glow-amber: rgba(245, 158, 11, 0.15);
            --glow-blue: rgba(59, 130, 246, 0.15);
        }

        body {
            background: var(--bg-primary);
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
            /* Removed perspective to avoid global sub-pixel fogginess */
        }

        @keyframes bgFloat {
            0%, 100% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(-20px, -15px) scale(1.03); }
        }

        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: url('bg-iwtk.png') no-repeat center center / cover;
            opacity: 0.30; /* Adjusted for better color visibility */
            z-index: -2;
            pointer-events: none;
            filter: brightness(0.40) contrast(1.1); /* Restored color, adjusted brightness */
            animation: bgFloat 30s ease-in-out infinite;
        }

        /* Dynamic Light Sweep / Glint Effect */
        @keyframes lightSweep {
            0% {
                left: -100%;
                top: -100%;
                opacity: 0;
            }

            20% {
                opacity: 0.3;
            }

            50% {
                opacity: 0.5;
            }

            80% {
                opacity: 0.3;
            }

            100% {
                left: 100%;
                top: 100%;
                opacity: 0;
            }
        }

        body::after {
            content: '';
            position: fixed;
            width: 200%;
            height: 200%;
            top: 0;
            left: 0;
            background: linear-gradient(135deg,
                    transparent 45%,
                    rgba(245, 158, 11, 0.08) 48%,
                    rgba(255, 255, 255, 0.12) 50%,
                    rgba(245, 158, 11, 0.08) 52%,
                    transparent 55%);
            z-index: -1;
            pointer-events: none !important; /* Force no-interaction */
            animation: lightSweep 8s cubic-bezier(0.4, 0, 0.2, 1) infinite;
            transform: rotate(-15deg);
        }

        .header,
        .controls,
        .action-bar,
        .card-grid,
        .pipeline-overlay {
            position: relative;
            z-index: 10; /* Boosted to ensure it's above background layers */
        }

        /* ─── HEADER ─── */
        @keyframes titleShimmer {
            0% {
                background-position: -200% center;
            }

            100% {
                background-position: 200% center;
            }
        }

        @keyframes titleGlow {

            0%,
            100% {
                text-shadow: 0 0 20px rgba(245, 158, 11, 0.3), 0 0 40px rgba(245, 158, 11, 0.1);
                filter: drop-shadow(0 0 8px rgba(245, 158, 11, 0.2));
            }

            50% {
                text-shadow: 0 0 30px rgba(245, 158, 11, 0.5), 0 0 60px rgba(245, 158, 11, 0.15);
                filter: drop-shadow(0 0 12px rgba(245, 158, 11, 0.3));
            }
        }

        .header {
            padding: 2.5rem 2rem 1.2rem;
            max-width: 1400px;
            margin: 0 auto;
            position: relative;
        }

        .header h1 {
            font-family: 'DM Serif Display', serif;
            font-size: 3.5rem;
            background: linear-gradient(90deg, #f59e0b, #fcd34d, #fff, #fcd34d, #f59e0b);
            background-size: 200% 100%;
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 2px;
            animation: titleShimmer 4s linear infinite, titleGlow 3s ease-in-out infinite;
            display: inline-block;
            position: relative;
        }

        .header-separator {
            width: 80px;
            height: 3px;
            background: linear-gradient(90deg, var(--accent-amber), var(--accent-coral), transparent);
            border: none;
            margin: 0.6rem 0 0.8rem;
            border-radius: 3px;
            box-shadow: 0 0 8px rgba(245, 158, 11, 0.3);
        }

        .header .subtitle {
            font-size: 1rem;
            margin-top: 0;
            line-height: 1.6;
            color: var(--text-secondary);
            letter-spacing: 0.2px;
        }

        .header .subtitle em {
            color: #fbbf24;
            font-style: italic;
            font-weight: 600;
            text-shadow: 0 0 12px rgba(245, 158, 11, 0.25);
        }

        .header .subtitle .dash {
            color: var(--text-muted);
            margin: 0 0.15rem;
        }

        /* ─── CONTROLS BAR ─── */
        .controls {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0.5rem 2rem 1rem;
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .control-row {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        .control-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 800;
            color: #ffffff;
            min-width: 80px;
            text-shadow: 0 0 8px rgba(255, 255, 255, 0.4), 0 2px 4px rgba(0, 0, 0, 0.8);
            position: relative;
        }

        .control-label::after {
            content: '';
            position: absolute;
            right: 0;
            top: 50%;
            transform: translateY(-50%);
            height: 12px;
            width: 1px;
            background: rgba(255, 255, 255, 0.1);
        }

        /* ─── GLOW ANIMATION ─── */
        @keyframes glowPulse {

            0%,
            100% {
                box-shadow: 0 0 8px rgba(245, 158, 11, 0.4), 0 0 20px rgba(245, 158, 11, 0.15), 0 4px 6px rgba(0, 0, 0, 0.4), inset 0 1px 0 rgba(255, 255, 255, 0.25), inset 0 -1px 0 rgba(0, 0, 0, 0.2);
            }

            50% {
                box-shadow: 0 0 12px rgba(245, 158, 11, 0.6), 0 0 30px rgba(245, 158, 11, 0.2), 0 4px 6px rgba(0, 0, 0, 0.4), inset 0 1px 0 rgba(255, 255, 255, 0.25), inset 0 -1px 0 rgba(0, 0, 0, 0.2);
            }
        }

        @keyframes triggerGlow {

            0%,
            100% {
                box-shadow: 0 0 10px rgba(245, 158, 11, 0.5), 0 0 30px rgba(245, 158, 11, 0.2), 0 0 60px rgba(245, 158, 11, 0.08), 0 6px 12px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.3), inset 0 -2px 4px rgba(0, 0, 0, 0.2);
            }

            50% {
                box-shadow: 0 0 15px rgba(245, 158, 11, 0.7), 0 0 40px rgba(245, 158, 11, 0.25), 0 0 80px rgba(245, 158, 11, 0.12), 0 6px 12px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.3), inset 0 -2px 4px rgba(0, 0, 0, 0.2);
            }
        }

        @keyframes chipGlow {

            0%,
            100% {
                box-shadow: 0 0 6px rgba(245, 158, 11, 0.35), 0 0 16px rgba(245, 158, 11, 0.1), 0 3px 6px rgba(0, 0, 0, 0.35), inset 0 1px 0 rgba(245, 158, 11, 0.2);
            }

            50% {
                box-shadow: 0 0 10px rgba(245, 158, 11, 0.5), 0 0 24px rgba(245, 158, 11, 0.15), 0 3px 6px rgba(0, 0, 0, 0.35), inset 0 1px 0 rgba(245, 158, 11, 0.2);
            }
        }

        /* ─── PILL TABS ─── */
        .pill-tabs {
            display: flex;
            gap: 0.35rem;
            background: linear-gradient(180deg, rgba(20, 20, 30, 0.8) 0%, rgba(15, 15, 22, 0.9) 100%);
            border-radius: 12px;
            padding: 4px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            box-shadow: inset 0 2px 6px rgba(0, 0, 0, 0.4), 0 1px 0 rgba(255, 255, 255, 0.03);
        }

        .pill {
            padding: 0.45rem 1.1rem;
            border-radius: 9px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            background: linear-gradient(180deg, rgba(50, 50, 70, 0.6) 0%, rgba(30, 30, 45, 0.8) 50%, rgba(20, 20, 35, 0.9) 100%);
            color: var(--text-secondary);
            font-size: 0.8rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            font-family: 'Inter', sans-serif;
            white-space: nowrap;
            box-shadow: 0 3px 6px rgba(0, 0, 0, 0.4), 0 1px 2px rgba(0, 0, 0, 0.3), inset 0 1px 0 rgba(255, 255, 255, 0.1), inset 0 -1px 0 rgba(0, 0, 0, 0.2);
            text-shadow: 0 1px 3px rgba(0, 0, 0, 0.5);
            transform: translateY(0);
            position: relative;
        }

        .pill:hover {
            color: var(--text-primary);
            background: linear-gradient(180deg, rgba(70, 70, 95, 0.7) 0%, rgba(45, 45, 65, 0.8) 50%, rgba(30, 30, 50, 0.9) 100%);
            border-color: rgba(245, 158, 11, 0.3);
            box-shadow: 0 0 8px rgba(245, 158, 11, 0.15), 0 5px 10px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.15), inset 0 -1px 0 rgba(0, 0, 0, 0.2);
            transform: translateY(-2px);
        }

        .pill:active {
            transform: translateY(1px);
            box-shadow: inset 0 2px 6px rgba(0, 0, 0, 0.5), 0 1px 1px rgba(0, 0, 0, 0.3);
            background: linear-gradient(180deg, rgba(25, 25, 40, 0.9) 0%, rgba(35, 35, 50, 0.8) 100%);
        }

        .pill.active {
            background: linear-gradient(180deg, #fcd34d 0%, #f59e0b 40%, #d97706 80%, #b45309 100%);
            color: #000;
            font-weight: 700;
            border-color: rgba(251, 191, 36, 0.6);
            animation: glowPulse 2.5s ease-in-out infinite;
            text-shadow: 0 1px 1px rgba(255, 255, 255, 0.2);
            letter-spacing: 0.3px;
        }

        /* ─── CHIPS ─── */
        .chips {
            display: flex;
            gap: 0.4rem;
            overflow-x: auto;
            scrollbar-width: none;
            padding-bottom: 4px;
            padding-top: 2px;
        }

        .chips::-webkit-scrollbar {
            display: none;
        }

        .chip {
            padding: 0.4rem 0.9rem;
            border-radius: 22px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            background: linear-gradient(180deg, rgba(50, 50, 70, 0.5) 0%, rgba(25, 25, 40, 0.7) 100%);
            color: var(--text-secondary);
            font-size: 0.75rem;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            font-family: 'Inter', sans-serif;
            white-space: nowrap;
            box-shadow: 0 3px 6px rgba(0, 0, 0, 0.35), 0 1px 2px rgba(0, 0, 0, 0.2), inset 0 1px 0 rgba(255, 255, 255, 0.08), inset 0 -1px 0 rgba(0, 0, 0, 0.15);
            transform: translateY(0);
            position: relative;
        }

        .chip:hover {
            border-color: rgba(245, 158, 11, 0.4);
            color: var(--text-primary);
            background: linear-gradient(180deg, rgba(70, 70, 95, 0.6) 0%, rgba(40, 40, 60, 0.7) 100%);
            box-shadow: 0 0 8px rgba(245, 158, 11, 0.12), 0 5px 10px rgba(0, 0, 0, 0.4), inset 0 1px 0 rgba(255, 255, 255, 0.12);
            transform: translateY(-2px);
        }

        .chip:active {
            transform: translateY(1px);
            box-shadow: inset 0 2px 5px rgba(0, 0, 0, 0.5), 0 1px 1px rgba(0, 0, 0, 0.3);
            background: linear-gradient(180deg, rgba(25, 25, 40, 0.8) 0%, rgba(35, 35, 50, 0.7) 100%);
        }

        .chip.active {
            background: linear-gradient(180deg, rgba(245, 158, 11, 0.2) 0%, rgba(180, 83, 9, 0.15) 100%);
            border-color: var(--accent-amber);
            color: var(--accent-amber);
            animation: chipGlow 3s ease-in-out infinite;
            text-shadow: 0 0 8px rgba(245, 158, 11, 0.4);
            font-weight: 600;
        }

        /* ─── FILTER PANEL & TOGGLE ─── */
        .controls-panel {
            max-height: 0;
            opacity: 0;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            transform: translateY(-10px);
            margin-bottom: 0;
        }

        .controls-panel.show {
            max-height: 500px;
            opacity: 1;
            transform: translateY(0);
            margin-bottom: 1.5rem;
        }

        .filter-toggle-btn {
            padding: 0.6rem 1.2rem;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Inter', sans-serif;
            display: flex;
            align-items: center;
            gap: 0.4rem;
        }

        .filter-toggle-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.3);
        }

        .filter-toggle-btn.active {
            background: linear-gradient(180deg, rgba(245, 158, 11, 0.2) 0%, rgba(180, 83, 9, 0.1) 100%);
            border-color: rgba(245, 158, 11, 0.5);
            color: var(--accent-amber);
            box-shadow: 0 0 15px rgba(245, 158, 11, 0.15);
        }

        /* ─── ACTION BAR ─── */
        .action-bar {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 2rem 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .stats-row {
            display: flex;
            gap: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        .stats-row span strong {
            color: var(--accent-amber);
        }

        .trigger-btn {
            padding: 0.6rem 1.6rem;
            border-radius: 12px;
            border: 2px solid rgba(245, 158, 11, 0.5);
            background: linear-gradient(180deg, rgba(245, 158, 11, 0.15) 0%, rgba(180, 83, 9, 0.1) 50%, rgba(120, 53, 5, 0.15) 100%);
            color: var(--accent-amber);
            font-size: 0.85rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            font-family: 'Inter', sans-serif;
            animation: triggerGlow 3s ease-in-out infinite;
            transform: translateY(0);
            text-shadow: 0 0 15px rgba(245, 158, 11, 0.5);
            letter-spacing: 0.5px;
            position: relative;
            overflow: hidden;
        }

        .trigger-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.15), transparent);
            transition: left 0.5s ease;
        }

        .trigger-btn:hover::before {
            left: 100%;
        }

        .trigger-btn:hover {
            background: linear-gradient(180deg, #fcd34d 0%, #f59e0b 40%, #d97706 80%, #b45309 100%);
            color: #000;
            border-color: #fbbf24;
            box-shadow: 0 0 20px rgba(245, 158, 11, 0.6), 0 0 50px rgba(245, 158, 11, 0.2), 0 0 80px rgba(245, 158, 11, 0.1), 0 8px 16px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.35), inset 0 -2px 4px rgba(0, 0, 0, 0.15);
            transform: translateY(-3px);
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.2);
            animation: none;
        }

        .trigger-btn:active {
            transform: translateY(2px);
            box-shadow: 0 0 10px rgba(245, 158, 11, 0.4), inset 0 3px 8px rgba(0, 0, 0, 0.4);
            background: linear-gradient(180deg, #d97706 0%, #b45309 50%, #92400e 100%);
            animation: none;
        }

        .trigger-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            transform: none;
            animation: none;
        }

        /* ─── CARD GRID ─── */
        .card-grid {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 2rem 3rem;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
            gap: 1.2rem;
        }

        /* ─── CARD ─── */
        .card {
            background: rgba(18, 18, 26, 0.9); /* More opaque for contrast */
            backdrop-filter: blur(10px); /* Lowered for clarity */
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 14px;
            padding: 1.6rem;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            opacity: 0;
            transform: translateY(20px);
            animation: cardAppear 0.5s ease forwards;
            position: relative;
            overflow: hidden;
            z-index: 1;
        }

        .card-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.85;
            /* Bright vivid images */
            z-index: -2;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            filter: contrast(1.1);
        }

        .card::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            /* Dark glass foundation + Cinematic vignette */
            background: linear-gradient(to bottom,
                    rgba(10, 10, 15, 0.8) 0%,
                    rgba(10, 10, 15, 0.4) 25%,
                    rgba(10, 10, 15, 0.85) 60%,
                    rgba(10, 10, 15, 0.98) 100%);
            z-index: -1;
        }

        .card:hover {
            transform: translateY(-6px);
            border-color: rgba(245, 158, 11, 0.4);
            box-shadow: 0 16px 40px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(245, 158, 11, 0.2);
        }

        .card:hover .card-bg {
            opacity: 1;
            transform: scale(1.04);
            filter: contrast(1.15) brightness(1.1);
        }

        @keyframes cardAppear {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ─── CARD: TOP ROW (badges) ─── */
        .card-badges {
            display: flex;
            gap: 0.4rem;
            align-items: center;
            flex-wrap: wrap;
        }

        .signal-badge {
            padding: 0.2rem 0.6rem;
            border-radius: 6px;
            font-size: 0.7rem;
            font-weight: 600;
            background: var(--glow-amber);
            color: var(--accent-amber);
            border: 1px solid rgba(245, 158, 11, 0.2);
        }

        .category-tag {
            padding: 0.2rem 0.6rem;
            border-radius: 6px;
            font-size: 0.65rem;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            background: var(--glow-blue);
            color: var(--accent-blue);
            border: 1px solid rgba(59, 130, 246, 0.2);
        }

        .score-badge {
            margin-left: auto;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--accent-amber);
            background: var(--glow-amber);
            padding: 0.2rem 0.6rem;
            border-radius: 6px;
            border: 1px solid rgba(245, 158, 11, 0.3);
            box-shadow: 0 0 10px rgba(245, 158, 11, 0.2);
            text-shadow: 0 0 5px rgba(245, 158, 11, 0.5);
        }

        /* ─── CARD: HEADLINE ─── */
        .card-headline {
            font-family: 'DM Serif Display', serif;
            font-size: 1.45rem;
            line-height: 1.25;
            color: #ffffff;
            text-shadow: 0 4px 15px rgba(0, 0, 0, 1);
            letter-spacing: -0.01em;
            margin-bottom: 0.8rem;
            font-weight: 800;
            /* Extra bold */
        }

        /* ─── CARD: HOOK ─── */
        .card-hook {
            font-size: 0.9rem;
            line-height: 1.5;
            color: #ffffff;
            font-weight: 700;
            /* Bold */
            border-left: 4px solid var(--accent-amber);
            padding: 0.75rem 0.75rem 0.75rem 1.2rem;
            background: rgba(0, 0, 0, 0.45);
            border-radius: 0 10px 10px 0;
            backdrop-filter: blur(8px);
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.8);
        }

        /* ─── CARD: TRIVIA ─── */
        .card-trivia {
            font-size: 0.85rem;
            line-height: 1.55;
            color: #f8fafc;
            background: rgba(255, 255, 255, 0.05); /* Same simple background for all */
            padding: 1rem 1rem 1rem 2.5rem;
            position: relative;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.08); /* Consistent border */
            border-left: 3px solid rgba(245, 158, 11, 0.6); /* Uniform amber left bar */
            backdrop-filter: blur(6px);
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.5);
            margin-bottom: 1rem;
        }

        .card-trivia::before {
            content: '✦';
            position: absolute;
            left: 0.8rem;
            top: 1.1rem;
            font-size: 1rem;
            line-height: 1;
            color: var(--accent-amber); /* Uniform amber star */
            text-shadow: 0 0 8px rgba(245, 158, 11, 0.5);
        }

        /* ─── CARD: FOOTER ─── */
        .card-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 0.5rem;
            border-top: 1px solid var(--border);
            margin-top: auto; /* Pushes the footer to the bottom of the card */
        }

        .card-source {
            font-size: 0.7rem;
            color: var(--accent-blue);
            text-decoration: none;
            max-width: 200px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .card-source:hover {
            text-decoration: underline;
        }

        .card-time {
            font-size: 0.7rem;
            color: var(--text-muted);
            font-family: 'JetBrains Mono', monospace;
        }

        /* ─── PIPELINE LOG ─── */
        .pipeline-overlay {
            display: none;
            position: fixed;
            bottom: 1rem;
            right: 1rem;
            width: 420px;
            max-height: 300px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
            z-index: 100;
            box-shadow: 0 16px 48px rgba(0, 0, 0, 0.5);
        }

        .pipeline-overlay.show {
            display: block;
        }

        .pipeline-header {
            padding: 0.7rem 1rem;
            background: rgba(245, 158, 11, 0.1);
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .pipeline-header h3 {
            font-size: 0.8rem;
            color: var(--accent-amber);
        }

        .pipeline-close {
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 1rem;
        }

        .pipeline-logs {
            padding: 0.7rem 1rem;
            max-height: 220px;
            overflow-y: auto;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.7rem;
            line-height: 1.6;
            color: var(--text-secondary);
        }

        .pipeline-logs::-webkit-scrollbar {
            width: 4px;
        }

        .pipeline-logs::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 2px;
        }

        /* ─── EMPTY STATE ─── */
        .empty-state {
            grid-column: 1 / -1;
            text-align: center;
            padding: 4rem 2rem;
            color: var(--text-muted);
        }

        .empty-state h2 {
            font-family: 'DM Serif Display', serif;
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
            color: var(--text-secondary);
        }

        /* ─── DETAILED MODAL ─── */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.88);
            backdrop-filter: blur(6px); /* Half the previous blur for sharper content */
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 2rem;
            animation: fadeIn 0.3s ease;
        }

        .modal-overlay.show {
            display: flex;
        }

        .modal-content {
            /* Matches the home page background opacity and brightness mathematically */
            background: linear-gradient(rgba(12, 12, 16, 0.88), rgba(12, 12, 16, 0.92)), url('bg-iwtk.png') no-repeat center center / cover;
            border: 1px solid rgba(245, 158, 11, 0.3);
            border-radius: 20px;
            width: 100%;
            max-width: 800px;
            max-height: 90vh;
            overflow-y: auto;
            position: relative;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7), 0 0 40px rgba(245, 158, 11, 0.1);
            animation: popIn 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .modal-close {
            position: absolute;
            top: 1rem;
            right: 1.5rem;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #fff;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            font-size: 1.2rem;
            cursor: pointer;
            z-index: 10;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.2s;
        }

        .modal-close:hover {
            background: var(--accent-amber);
            color: #000;
        }

        .modal-hero {
            height: 300px;
            width: 100%;
            object-fit: cover;
            border-bottom: 2px solid var(--accent-amber);
        }

        .modal-body {
            padding: 2.5rem;
        }

        .modal-category {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--accent-amber);
            margin-bottom: 1rem;
            display: block;
            font-weight: 700;
        }

        .modal-title {
            font-family: 'DM Serif Display', serif;
            font-size: 2.8rem;
            line-height: 1.15;
            color: #fff;
            margin-bottom: 2rem;
            text-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
        }

        .modal-hook {
            font-size: 1.4rem;
            line-height: 1.4;
            color: #fff;
            font-weight: 600;
            padding: 1.5rem 2rem;
            border-left: 5px solid var(--accent-amber);
            margin-bottom: 2.5rem;
            background: rgba(245, 158, 11, 0.05);
            border-radius: 4px 16px 16px 4px;
            border-right: 1px solid rgba(245, 158, 11, 0.1);
            font-family: 'DM Serif Display', serif;
            font-style: italic;
            position: relative;
        }

        .modal-hook::before {
            content: '"';
            position: absolute;
            top: -10px;
            left: 10px;
            font-size: 4rem;
            color: rgba(245, 158, 11, 0.2);
            font-family: 'DM Serif Display', serif;
        }

        .modal-caption {
            font-size: 1.15rem;
            line-height: 1.8;
            color: #cbd5e1;
            margin-bottom: 3rem;
            white-space: pre-wrap;
            font-family: 'Inter', sans-serif;
            letter-spacing: -0.01em;
            text-align: left;
            /* Justify was creating large gaps */
        }

        .modal-trivia {
            background: rgba(245, 158, 11, 0.05);
            border: 1px solid rgba(245, 158, 11, 0.2);
            padding: 1.5rem;
            border-radius: 12px;
            margin-bottom: 2rem;
            color: #f8fafc;
            font-size: 1.05rem;
            line-height: 1.6;
        }

        .modal-trivia-title {
            display: block;
            font-size: 1.3rem;
            color: var(--accent-amber);
            margin-bottom: 1rem;
            font-family: 'DM Serif Display', serif;
            text-shadow: 0 0 10px rgba(245, 158, 11, 0.3);
            letter-spacing: 0.5px;
        }

        .modal-trivia-list {
            list-style: none;
            padding-left: 0;
            margin: 0;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        /* ─── DETAIL TRIVIA ITEMS (modal + card shared) ─── */
        .detail-trivia-item {
            display: flex;
            gap: 0.8rem;
            align-items: flex-start;
            padding: 1.25rem;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            margin-bottom: 0.75rem;
            transition: all 0.3s ease;
        }
        .detail-trivia-item:last-child { margin-bottom: 0; }

        .trivia-bullet {
            font-size: 1.2rem;
            line-height: 1;
            flex-shrink: 0;
            margin-top: 0.1rem;
        }
        .detail-trivia-item p {
            margin: 0;
            color: rgba(255, 255, 255, 0.9);
            font-size: 1.05rem;
            line-height: 1.6;
        }

        /* 5 Distinct Color Accents for the 5 Facts */
        .detail-trivia-item:nth-child(1) { border-left: 4px solid var(--accent-amber); background: linear-gradient(90deg, rgba(245, 158, 11, 0.1) 0%, rgba(245, 158, 11, 0.02) 100%); }
        .detail-trivia-item:nth-child(1) .trivia-bullet { color: var(--accent-amber); text-shadow: 0 0 8px rgba(245, 158, 11, 0.5); }

        .detail-trivia-item:nth-child(2) { border-left: 4px solid var(--accent-blue); background: linear-gradient(90deg, rgba(59, 130, 246, 0.1) 0%, rgba(59, 130, 246, 0.02) 100%); }
        .detail-trivia-item:nth-child(2) .trivia-bullet { color: var(--accent-blue); text-shadow: 0 0 8px rgba(59, 130, 246, 0.5); }

        .detail-trivia-item:nth-child(3) { border-left: 4px solid var(--accent-green); background: linear-gradient(90deg, rgba(16, 185, 129, 0.1) 0%, rgba(16, 185, 129, 0.02) 100%); }
        .detail-trivia-item:nth-child(3) .trivia-bullet { color: var(--accent-green); text-shadow: 0 0 8px rgba(16, 185, 129, 0.5); }

        .detail-trivia-item:nth-child(4) { border-left: 4px solid var(--accent-purple); background: linear-gradient(90deg, rgba(139, 92, 246, 0.1) 0%, rgba(139, 92, 246, 0.02) 100%); }
        .detail-trivia-item:nth-child(4) .trivia-bullet { color: var(--accent-purple); text-shadow: 0 0 8px rgba(139, 92, 246, 0.5); }

        .detail-trivia-item:nth-child(5) { border-left: 4px solid var(--accent-pink); background: linear-gradient(90deg, rgba(236, 72, 153, 0.1) 0%, rgba(236, 72, 153, 0.02) 100%); }
        .detail-trivia-item:nth-child(5) .trivia-bullet { color: var(--accent-pink); text-shadow: 0 0 8px rgba(236, 72, 153, 0.5); }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        @keyframes popIn {
            0% {
                opacity: 0;
                transform: scale(0.95) translateY(10px);
            }

            100% {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        /* ═══════════════════════════════════════════════════════
           RESPONSIVE — TABLET (max 768px)
        ═══════════════════════════════════════════════════════ */
        @media (max-width: 768px) {
            /* HEADER */
            .header {
                padding: 2rem 1.2rem 1rem;
                text-align: center;
            }
            .header h1 {
                font-size: 3rem;
            }
            .header .subtitle {
                font-size: 0.95rem;
            }

            /* ACTION BAR */
            .action-bar {
                flex-direction: column;
                align-items: flex-start;
                gap: 0.8rem;
                padding: 0 1.2rem 1rem;
            }
            .stats-row {
                flex-wrap: wrap;
                gap: 0.8rem;
                font-size: 0.75rem;
            }
            .action-bar > div:last-child {
                align-self: stretch;
                display: flex;
                gap: 0.6rem;
            }
            .trigger-btn, .filter-toggle-btn {
                flex: 1;
                justify-content: center;
                text-align: center;
            }

            /* CARD GRID */
            .card-grid {
                grid-template-columns: 1fr;
                padding: 0 1rem 2rem;
                gap: 1rem;
            }
            .header, .controls, .action-bar {
                padding-left: 1.2rem;
                padding-right: 1.2rem;
            }

            /* CHIP FILTERS */
            .controls {
                padding: 0 1.2rem 1rem;
            }
            .chips {
                gap: 0.4rem;
            }
            .chip {
                font-size: 0.7rem;
                padding: 0.3rem 0.7rem;
            }

            /* CARDS */
            .card {
                padding: 1.2rem;
            }
            .card-headline {
                font-size: 1.2rem;
            }
            .card-hook {
                font-size: 0.85rem;
            }
            .card-trivia {
                font-size: 0.82rem;
            }

            /* PIPELINE OVERLAY */
            .pipeline-overlay {
                width: calc(100% - 2rem);
                left: 1rem;
                right: 1rem;
                bottom: 1rem;
            }

            /* MODAL */
            .modal-overlay {
                padding: 0;
                align-items: flex-end;
            }
            .modal-container {
                width: 100%;
                max-width: 100%;
                max-height: 92vh;
                border-radius: 20px 20px 0 0;
                margin: 0;
            }
            .modal-hero {
                height: 200px;
            }
            .modal-body {
                padding: 1.4rem 1.2rem 2rem;
            }
            .modal-title {
                font-size: 1.6rem;
                line-height: 1.2;
                margin-bottom: 1.2rem;
            }
            .modal-hook {
                font-size: 1.1rem;
                padding: 1rem 1.2rem;
                margin-bottom: 1.5rem;
            }
            .modal-caption {
                font-size: 1rem;
                line-height: 1.7;
                margin-bottom: 2rem;
            }
            .modal-trivia {
                padding: 1rem;
            }
            .modal-close {
                top: 0.8rem;
                right: 0.8rem;
                width: 34px;
                height: 34px;
                font-size: 1rem;
            }
            .detail-trivia-item {
                padding: 0.9rem;
            }
            .detail-trivia-item p {
                font-size: 0.95rem;
            }
        }

        /* ═══════════════════════════════════════════════════════
           RESPONSIVE — MOBILE (max 480px)
        ═══════════════════════════════════════════════════════ */
        @media (max-width: 480px) {
            .header h1 {
                font-size: 2.5rem;
            }
            .header .subtitle {
                font-size: 0.85rem;
            }
            .card-headline {
                font-size: 1.1rem;
            }
            .score-badge {
                font-size: 0.7rem;
            }
            .modal-title {
                font-size: 1.35rem;
            }
            .modal-trivia-title {
                font-size: 1.1rem;
            }
            .modal-hook {
                font-size: 1rem;
            }
            .modal-caption {
                font-size: 0.92rem;
            }
            .stats-row {
                gap: 0.6rem;
            }
        }

    </style>
</head>

<body>

    <!-- ─── HEADER ─── -->
    <header class="header">
        <h1>IWTK</h1>
        <hr class="header-separator">
        <p class="subtitle">India Wants To Know <span class="dash">—</span> Curated facts from recent events that make you
            say <em>"I did NOT know that"</em></p>
    </header>

    <!-- ─── ACTION BAR ─── -->
    <div class="action-bar">
        <div class="stats-row">
            <div id="statsRow" style="display: flex; gap: 1.5rem;">
                <span>Loading...</span>
            </div>
            <div id="filterCount" style="margin-left: 1.5rem; color: var(--accent-amber); font-weight: 600; font-size: 0.8rem; display: none;">
                Showing <span id="resCount">0</span> facts
            </div>
        </div>
        <div style="display: flex; gap: 1rem;">
            <button class="filter-toggle-btn" id="filterToggleBtn" onclick="toggleFilters()">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"></polygon>
                </svg> Filters
            </button>
            <button class="trigger-btn" id="triggerBtn" onclick="triggerPipeline()">⚡ Run Pipeline</button>
        </div>
    </div>

    <!-- ─── CONTROLS PANEL ─── -->
    <div class="controls-panel" id="controlsPanel">
        <div class="controls">
            <div class="control-row">
                <span class="control-label">Time</span>
                <div class="pill-tabs" id="timeWindowTabs">
                    <button class="pill active" data-window="all">All Time</button>
                    <button class="pill" data-window="today">Today</button>
                    <button class="pill" data-window="week">This Week</button>
                    <button class="pill" data-window="month">This Month</button>
                    <button class="pill" data-window="quarter">Last Quarter</button>
                    <button class="pill" data-window="year">This Year</button>
                </div>
            </div>
            <div class="control-row">
                <span class="control-label">Category</span>
                <div class="chips" id="categoryChips">
                    <button class="chip active" data-cat="all">All</button>
                    <button class="chip" data-cat="entertainment">🎬 Entertainment</button>
                    <button class="chip" data-cat="music">🎵 Music</button>
                    <button class="chip" data-cat="sports">🏏 Sports</button>
                    <button class="chip" data-cat="science">🔬 Science</button>
                    <button class="chip" data-cat="history">🏛️ History</button>
                    <button class="chip" data-cat="animals">🐾 Animals</button>
                    <button class="chip" data-cat="technology">🤖 Tech & AI</button>
                    <button class="chip" data-cat="geography">🌍 Geography</button>
                    <button class="chip" data-cat="health">🏥 Health</button>
                    <button class="chip" data-cat="trending">🔥 Trending</button>
                </div>
            </div>
            <div class="control-row">
                <span class="control-label">Signal</span>
                <div class="chips" id="signalChips">
                    <button class="chip active" data-signal="all">All</button>
                    <button class="chip" data-signal="Surprise">🎲 Surprise</button>
                    <button class="chip" data-signal="Novelty">🥇 Novelty</button>
                    <button class="chip" data-signal="Emotion">❤️ Emotion</button>
                    <button class="chip" data-signal="Shareability">📣 Shareability</button>
                    <button class="chip" data-signal="India">🇮🇳 India Connection</button>
                    <button class="chip" data-signal="Explainer">📖 Explainer</button>
                    <button class="chip" data-signal="Parallel">🔄 Parallel</button>
                </div>
            </div>
        </div>
    </div>

    <!-- ─── CARD GRID ─── -->
    <div class="card-grid" id="cardGrid">
        <div class="empty-state">
            <h2>Loading facts...</h2>
            <p>Fetching the most interesting stories from the database.</p>
        </div>
    </div>

    <!-- ─── PIPELINE LOG OVERLAY ─── -->
    <div class="pipeline-overlay" id="pipelineOverlay">
        <div class="pipeline-header">
            <h3>⚡ Pipeline Running</h3>
            <button class="pipeline-close" onclick="closePipelineLog()">✕</button>
        </div>
        <div class="pipeline-logs" id="pipelineLogs"></div>
    </div>

    <!-- ─── DETAILED MODAL ─── -->
    <div class="modal-overlay" id="detailModal" onclick="if(event.target===this) closeDetailModal()">
        <div class="modal-content">
            <button class="modal-close" onclick="closeDetailModal()">✕</button>
            <img src="" alt="" class="modal-hero" id="mHero">
            <div class="modal-body">
                <span class="modal-category" id="mCategory"></span>
                <h2 class="modal-title" id="mTitle"></h2>
                <div class="modal-hook" id="mHook"></div>
                <div class="modal-caption" id="mCaption"></div>
                <div class="modal-trivia" id="mTrivia"></div>

            </div>
        </div>
    </div>

    <script>
        // ─── STATE ────────────────────────────────────────────────
        let currentTimeWindow = 'all';
        let currentCategory = 'all';
        let currentSignal = 'all';
        let pipelineInterval = null;

        // ─── RELATIVE TIME ──────────────────────────────────────
        function relativeTime(dateStr) {
            const diff = Date.now() - new Date(dateStr).getTime();
            const mins = Math.floor(diff / 60000);
            if (mins < 60) return `${mins}m ago`;
            const hrs = Math.floor(mins / 60);
            if (hrs < 24) return `${hrs}h ago`;
            const days = Math.floor(hrs / 24);
            if (days < 7) return `${days}d ago`;
            const weeks = Math.floor(days / 7);
            if (weeks < 4) return `${weeks}w ago`;
            const months = Math.floor(days / 30);
            return `${months}mo ago`;
        }

        // ─── EXTRACT DOMAIN FROM URL ────────────────────────────
        function getDomain(url) {
            try { return new URL(url).hostname.replace('www.', ''); }
            catch { return 'source'; }
        }

        // ─── FETCH & RENDER ─────────────────────────────────────
        async function loadContent() {
            const params = new URLSearchParams();
            if (currentCategory !== 'all') params.set('category', currentCategory);
            if (currentTimeWindow !== 'all') params.set('timeWindow', currentTimeWindow);
            if (currentSignal !== 'all') params.set('signal', currentSignal);

            const grid = document.getElementById('cardGrid');
            const countEl = document.getElementById('filterCount');
            
            // Visual feedback: Dim cards while loading
            grid.style.opacity = '0.5';
            grid.style.pointerEvents = 'none';

            try {
                const res = await fetch(`/api/content?${params.toString()}`);
                const data = await res.json();
                
                grid.style.opacity = '1';
                grid.style.pointerEvents = 'auto';
                
                renderCards(data);
                
                // Update results counter
                document.getElementById('resCount').textContent = data.length;
                countEl.style.display = (currentCategory !== 'all' || currentTimeWindow !== 'all' || currentSignal !== 'all') ? 'block' : 'none';

            } catch (e) {
                console.error('Failed to load:', e);
                grid.style.opacity = '1';
                grid.style.pointerEvents = 'auto';
            }
        }

        async function loadStats() {
            try {
                const res = await fetch('/api/stats');
                const data = await res.json();
                document.getElementById('statsRow').innerHTML = `
            <span><strong>${data.totalPosts}</strong> facts curated</span>
            <span>Avg score: <strong>${data.avgScore}/10</strong></span>
            <span><strong>${data.categories?.length || 0}</strong> categories</span>
        `;
            } catch (e) { /* ignore */ }
        }

        // Global state to hold loaded news items
        let loadedItems = [];

        function renderCards(items) {
            loadedItems = items;
            const grid = document.getElementById('cardGrid');
            if (!items.length) {
                grid.innerHTML = `
            <div class="empty-state">
                <h2>No facts found</h2>
                <p>Try changing the filters or run the pipeline to discover new stories.</p>
            </div>`;
                return;
            }
            grid.innerHTML = items.map((item, i) => {
                let triviaArr = [];
                try { triviaArr = JSON.parse(item.trivia); } catch (e) { triviaArr = [item.trivia]; }
                const firstTrivia = Array.isArray(triviaArr) && triviaArr.length > 0 ? triviaArr[0] : item.trivia;

                return `
        <div class="card" style="animation-delay: ${i * 0.08}s; cursor: pointer;" onclick="openDetailModal(${i})">
            ${item.imageUrl ? `<img class="card-bg" src="${item.imageUrl}" alt="" />` : ''}
            <div class="card-badges">
                ${item.signalBadge ? `<span class="signal-badge">${item.signalBadge}</span>` : ''}
                <span class="category-tag">${getCategoryEmoji(item.category)} ${item.category}</span>
                <span class="score-badge">${item.score}/10</span>
            </div>
            <div class="card-headline">${item.headline || item.title}</div>
            ${item.hookSentence ? `<div class="card-hook">${item.hookSentence}</div>` : ''}
            <div class="card-trivia">${firstTrivia}</div>
            <div class="card-footer" onclick="event.stopPropagation()">
                <a class="card-source" href="${item.sourceUrl}" target="_blank" rel="noopener">${getDomain(item.sourceUrl)}</a>
                <span class="card-time">${relativeTime(item.createdAt)}</span>
            </div>
        </div>
    `}).join('');
        }

        function getCategoryEmoji(cat) {
            const map = {
                entertainment: '🎬', music: '🎵', sports: '🏏', science: '🔬', history: '🏛️',
                animals: '🐾', technology: '🤖', geography: '🌍', health: '🏥', trending: '🔥', controversy: '💥'
            };
            return map[cat] || '📰';
        }

        // ─── FILTER HANDLERS ────────────────────────────────────
        function toggleFilters() {
            const panel = document.getElementById('controlsPanel');
            const btn = document.getElementById('filterToggleBtn');
            panel.classList.toggle('show');
            btn.classList.toggle('active');
        }

        document.querySelectorAll('#timeWindowTabs .pill').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('#timeWindowTabs .pill').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentTimeWindow = btn.dataset.window;
                loadContent();
            });
        });
        document.querySelectorAll('#categoryChips .chip').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('#categoryChips .chip').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentCategory = btn.dataset.cat;
                loadContent();
            });
        });
        document.querySelectorAll('#signalChips .chip').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('#signalChips .chip').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentSignal = btn.dataset.signal;
                loadContent();
            });
        });

        // ─── PIPELINE TRIGGER ───────────────────────────────────
        async function triggerPipeline() {
            const btn = document.getElementById('triggerBtn');
            btn.disabled = true;
            btn.textContent = '⏳ Running...';
            document.getElementById('pipelineOverlay').classList.add('show');

            try {
                await fetch('/api/trigger', { method: 'POST' });
                pipelineInterval = setInterval(pollPipeline, 2000);
            } catch (e) {
                btn.disabled = false;
                btn.textContent = '⚡ Run Pipeline';
            }
        }

        async function pollPipeline() {
            try {
                const res = await fetch('/api/pipeline-status');
                const data = await res.json();
                const logsEl = document.getElementById('pipelineLogs');
                logsEl.innerHTML = (data.logs || []).map(l => `<div>${l}</div>`).join('');
                logsEl.scrollTop = logsEl.scrollHeight;

                if (data.status === 'done' || data.status === 'error' || data.status === 'idle') {
                    clearInterval(pipelineInterval);
                    const btn = document.getElementById('triggerBtn');
                    btn.disabled = false;
                    btn.textContent = '⚡ Run Pipeline';
                    loadContent();
                    loadStats();
                }
            } catch (e) { /* ignore */ }
        }

        function closePipelineLog() {
            document.getElementById('pipelineOverlay').classList.remove('show');
        }

        // ─── MODAL LOGIC ────────────────────────────────────────
        function openDetailModal(index) {
            const item = loadedItems[index];
            if (!item) return;

            if (item.imageUrl) {
                document.getElementById('mHero').src = item.imageUrl;
                document.getElementById('mHero').style.display = 'block';
            } else {
                document.getElementById('mHero').style.display = 'none';
            }

            document.getElementById('mCategory').textContent = `${getCategoryEmoji(item.category)} ${item.category.toUpperCase()} • ${item.signalBadge || ''}`;
            document.getElementById('mTitle').textContent = item.headline || item.title;

            const hookEl = document.getElementById('mHook');
            let displayCaption = item.caption || item.description || '';

            if (item.hookSentence && item.hookSentence.trim().length > 0) {
                hookEl.innerHTML = item.hookSentence;
                hookEl.style.display = 'block';
                // Prevent duplication if caption starts with the hook (Safe whole-word check)
                const escapedHook = item.hookSentence.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
                const regex = new RegExp('^' + escapedHook + '\\b', 'i');
                if (regex.test(displayCaption)) {
                    displayCaption = displayCaption.replace(regex, '').trim();
                }
            } else {
                hookEl.style.display = 'none';
                hookEl.innerHTML = '';
            }

            document.getElementById('mCaption').textContent = displayCaption;

            let triviaArr = [];
            try { triviaArr = JSON.parse(item.trivia); } catch (e) { triviaArr = [item.trivia]; }

            const triviaItems = triviaArr.map(t => `
                <div class="detail-trivia-item">
                    <span class="trivia-bullet">✦</span>
                    <p>${t}</p>
                </div>`).join('');
            document.getElementById('mTrivia').innerHTML = `<strong class="modal-trivia-title">💡 Fascinating Facts:</strong>${triviaItems}`;
            document.getElementById('detailModal').classList.add('show');
            document.body.style.overflow = 'hidden'; // prevent background scrolling
        }

        function closeDetailModal() {
            document.getElementById('detailModal').classList.remove('show');
            document.body.style.overflow = 'auto'; // restore scrolling
        }

        // ─── INIT ───────────────────────────────────────────────
        loadContent();
        loadStats();

        // Auto-refresh content every 10 minutes to grab newly generated news
        setInterval(() => {
            loadContent();
            loadStats();
        }, 10 * 60 * 1000);
    </script>
</body>

</html>
